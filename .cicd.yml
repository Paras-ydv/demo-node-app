# .cicd.yml - PipelineHub CI/CD Configuration
name: demo-node-app-pipeline
language: node
environment: production

# Pipeline stages to execute
stages:
  - checkout
  - install
  - build
  - test
  - security_scan
  - package
  - deploy
  - notify

# Environment variables
variables:
  NODE_ENV: production
  BUILD_TARGET: dist
  PORT: 3000

# Custom scripts per stage
scripts:
  install:
    - npm ci --prefer-offline
    - npm audit fix
  build:
    - npm run build
    - npm run lint
  test:
    - npm test -- --coverage --maxWorkers=4
  security_scan:
    - npm audit --audit-level=high
  package:
    - docker build -t demo-node-app:$COMMIT_HASH .
    - docker tag demo-node-app:$COMMIT_HASH demo-node-app:latest
  deploy:
    - kubectl set image deployment/demo-node-app app=demo-node-app:$COMMIT_HASH
    - kubectl rollout status deployment/demo-node-app
